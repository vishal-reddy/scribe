name = "scribe"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "scribe.kecker.co", custom_domain = true }
]

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
EMAIL_FROM = "Scribe <no-reply@kecker.co>"
# Comma-separated list of allowed CORS origins for production
# ALLOWED_ORIGINS = "https://scribe.example.com"

# In production, set via: wrangler secret put ANTHROPIC_API_KEY
# For local dev, add to .dev.vars file

[[durable_objects.bindings]]
name = "DOCUMENT_SYNC"
class_name = "DocumentSync"

[[durable_objects.bindings]]
name = "SCRIBE_MCP"
class_name = "ScribeMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DocumentSync", "ScribeMCP"]

[[d1_databases]]
binding = "DB"
database_name = "scribe-db"
database_id = "4f10070e-b7be-4922-916d-a41765388d46"
migrations_dir = "src/db/migrations"
